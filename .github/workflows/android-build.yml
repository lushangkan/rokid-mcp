name: Android Build

on:
  push:
    paths:
      - "apps/android/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    paths:
      - "apps/android/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run shared protocol tests
        run: ./gradlew --no-daemon :share:test

      - name: Run phone app tests
        run: ./gradlew --no-daemon :phone-app:test

      - name: Run integration tests
        run: ./gradlew --no-daemon :integration-tests:test

      - name: Build debug APKs
        run: ./gradlew --no-daemon :phone-app:assembleDebug :glasses-app:assembleDebug

      - name: Upload debug APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apks
          path: |
            apps/android/phone-app/build/outputs/apk/debug/*.apk
            apps/android/glasses-app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
